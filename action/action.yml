name: "MLGuard Check"
description: "Pre-deployment safety checks for ML models"
inputs:
  model-path:
    description: "Path to the model file (.pkl, .joblib, .pt)"
    required: true
  reference-data:
    description: "Path to reference dataset CSV"
    required: true
  current-data:
    description: "Path to current dataset CSV"
    required: true
  baseline-path:
    description: "Path to baseline metrics JSON"
    required: false
    default: "./mlguard_baseline.json"
  target-column:
    description: "Name of target column"
    required: false
    default: "target"
  task-type:
    description: "classification or regression"
    required: false
    default: "classification"
  output-path:
    description: "Path for the Markdown report"
    required: false
    default: "./mlguard_report.md"
  json-output-path:
    description: "Path for the JSON report"
    required: false
    default: "./mlguard_report.json"
  latency-runs:
    description: "Number of single-sample predictions for latency measurement"
    required: false
    default: "100"
runs:
  using: "composite"
  steps:
    - name: Install MLGuard from this action checkout
      run: pip install -e "${{ github.action_path }}/.."
      shell: bash

    - name: Run checks
      run: |
        mlguard check \
          --model "${{ inputs.model-path }}" \
          --ref "${{ inputs.reference-data }}" \
          --current "${{ inputs.current-data }}" \
          --baseline-path "${{ inputs.baseline-path }}" \
          --target "${{ inputs.target-column }}" \
          --task "${{ inputs.task-type }}" \
          --output "${{ inputs.output-path }}" \
          --json-output "${{ inputs.json-output-path }}" \
          --latency-runs "${{ inputs.latency-runs }}"
      shell: bash

    - name: Upload reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mlguard-reports
        path: |
          ${{ inputs.output-path }}
          ${{ inputs.json-output-path }}
